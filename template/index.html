<!DOCTYPE html>
<html>

<head>
    <title>Car Price Predictor</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background: var(--glass-bg);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: #1a1a1a;
            font-weight: 700;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
            transition: border-color 0.3s ease;
            font-size: 1rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .result {
            margin-top: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
            font-size: 1.2rem;
            min-height: 1.5rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Car Price Prediction</h2>

        <form action="/predict" method="post">
            <input type="text" name="year" placeholder="Year" required>
            <input type="text" name="levy" placeholder="Levy" required>
            <input type="text" name="km_driven" placeholder="KM Driven" required>
            <input type="text" name="engine" placeholder="Engine Capacity" required>
            <input type="text" name="max_power" placeholder="Max Power" required>
            <button type="submit">Predict Price</button>
        </form>

        <div class="result">
            {{ prediction_text }}
        </div>
    </div>

</body>

</html>
